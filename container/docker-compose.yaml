services:
  algebraic-distiller:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: 202110004-AlgebraicDistiller

    image: algebraic-reasoning-distiller:latest

    # ── GPU ────────────────────────────────────────────────────────────────────
    # DGX H200: 8x NVIDIA H200 (141 GB/GPU). Using 1 GPU to not block others.
    # Change device_ids to ["1"], ["2"], etc. if GPU 0 is taken.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
        limits:
          cpus: '8'       # max 8 cores out of 112 available (~7%)
          memory: 64G     # max 64 GB RAM out of 2 TB available (~3%)

    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONPATH=/root/work
      # Limit internal threads to avoid saturating CPUs
      - OMP_NUM_THREADS=8
      - MKL_NUM_THREADS=8
      - OPENBLAS_NUM_THREADS=8
      # HuggingFace cache inside the persistent workdata volume
      - HF_HOME=/root/workdata/huggingface
      - TRANSFORMERS_CACHE=/root/workdata/huggingface

    # Shared memory for DataLoader workers
    shm_size: '16gb'

    ulimits:
      memlock: -1
      stack: 67108864

    volumes:
      - ~/workspace:/root/work           # persistent code + weights
      - /workdata:/root/workdata         # large datasets and HF model cache

    stdin_open: true
    tty: true
    network_mode: host
    restart: unless-stopped
